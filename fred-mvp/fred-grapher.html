<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fred Grapher — FredInstitute</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   FRED GRAPHER — FredInstitute Interactive Tool
   White · Orange #F97316 · Clean · Minimal
═══════════════════════════════════════════════════ */
:root {
  --or:    #F97316;
  --or2:   #EA580C;
  --or3:   #C2410C;
  --or50:  #FFF7ED;
  --or100: #FFEDD5;
  --or200: #FED7AA;
  --or300: #FDBA74;
  --white: #FFFFFF;
  --g50:   #F9FAFB;
  --g100:  #F3F4F6;
  --g200:  #E5E7EB;
  --g300:  #D1D5DB;
  --g400:  #9CA3AF;
  --g500:  #6B7280;
  --g600:  #4B5563;
  --g700:  #374151;
  --g800:  #1F2937;
  --g900:  #111827;
  --grad:  linear-gradient(135deg, #F97316, #EA580C);
  --r:     0.5rem;
  --rl:    0.875rem;
  --sh:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shmd:  0 4px 12px rgba(0,0,0,.08);
  --shlg:  0 8px 24px rgba(0,0,0,.1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--white);
  color: var(--g900);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ── TOPBAR ── */
.topbar {
  height: 52px;
  background: var(--white);
  border-bottom: 1px solid var(--g200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.25rem;
  gap: 1rem;
  flex-shrink: 0;
  z-index: 100;
  position: relative;
}
.tb-left { display:flex; align-items:center; gap:1rem; }
.tb-brand { display:flex; align-items:center; gap:.625rem; }
.tb-logo {
  width:32px; height:32px;
  background: var(--grad);
  border-radius: var(--r);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.tb-logo svg { width:18px; height:18px; stroke:white; fill:none; }
.tb-title { font-size:.9rem; font-weight:800; color:var(--g900); }
.tb-subtitle { font-size:.68rem; font-weight:500; color:var(--g400); margin-top:.05rem; }
.tb-sep { width:1px; height:22px; background:var(--g200); }
.tb-btn {
  display:inline-flex; align-items:center; gap:.35rem;
  padding:.38rem .8rem;
  font-family:inherit; font-size:.75rem; font-weight:600;
  border-radius:99px; border:1px solid var(--g200);
  cursor:pointer; transition:all .14s; background:var(--white); color:var(--g600);
}
.tb-btn:hover { background:var(--g50); border-color:var(--g300); color:var(--g800); }
.tb-btn.primary { background:var(--grad); border-color:transparent; color:white; box-shadow:0 2px 6px rgba(234,88,12,.25); }
.tb-btn.primary:hover { background:linear-gradient(135deg,#EA580C,#C2410C); }
.tb-btn svg { width:13px; height:13px; }

/* ── LAYOUT ── */
.app { display:flex; height:calc(100vh - 52px); }

/* ── LEFT PANEL ── */
.panel {
  width: 320px;
  min-width: 280px;
  max-width: 380px;
  background: var(--white);
  border-right: 1px solid var(--g200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  resize: horizontal;
}
.panel-section { flex-shrink:0; border-bottom:1px solid var(--g100); }
.panel-section-title {
  font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--g400); padding:.625rem 1rem .4rem;
}

/* Expressions list */
.expr-list { padding:.5rem; display:flex; flex-direction:column; gap:.375rem; max-height:280px; overflow-y:auto; }
.expr-row {
  display:flex; align-items:center; gap:.5rem;
  background:var(--g50); border:1px solid var(--g200);
  border-radius:var(--r); padding:.45rem .5rem .45rem .875rem;
  transition:all .14s; position:relative;
}
.expr-row:hover { border-color:var(--g300); }
.expr-row.active { border-color:var(--or300); background:var(--or50); }
.expr-row.error { border-color:#FCA5A5; background:#FEF2F2; }
.expr-color-dot {
  width:14px; height:14px; border-radius:50%;
  flex-shrink:0; cursor:pointer; border:2px solid rgba(0,0,0,.1);
  transition:transform .15s;
}
.expr-color-dot:hover { transform:scale(1.2); }
.expr-input {
  flex:1; border:none; outline:none; background:transparent;
  font-family:'JetBrains Mono', monospace; font-size:.82rem; font-weight:500;
  color:var(--g900); min-width:0;
  user-select:text;
}
.expr-input::placeholder { color:var(--g300); }
.expr-del {
  width:22px; height:22px; border-radius:50%; border:none;
  background:transparent; cursor:pointer; color:var(--g400);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .14s; font-size:.9rem; line-height:1;
}
.expr-del:hover { background:var(--g100); color:var(--g700); }
.expr-add-btn {
  margin:.375rem .5rem;
  width:calc(100% - 1rem);
  padding:.5rem;
  border:1.5px dashed var(--g300);
  border-radius:var(--r);
  background:transparent; cursor:pointer;
  font-family:inherit; font-size:.75rem; font-weight:600; color:var(--g400);
  transition:all .14s; display:flex; align-items:center; justify-content:center; gap:.35rem;
}
.expr-add-btn:hover { border-color:var(--or300); color:var(--or2); background:var(--or50); }
.expr-add-btn svg { width:13px; height:13px; }
.expr-error-msg {
  font-size:.62rem; color:#DC2626; padding:.2rem .875rem .4rem;
  font-family:'JetBrains Mono', monospace;
}

/* Keyboard helper */
.kb-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:.3rem;
  padding:.625rem .75rem;
}
.kb-btn {
  padding:.38rem .2rem;
  border:1px solid var(--g200); border-radius:.375rem;
  background:var(--white); cursor:pointer;
  font-family:'JetBrains Mono', monospace; font-size:.75rem; font-weight:500; color:var(--g700);
  transition:all .12s; text-align:center;
}
.kb-btn:hover { background:var(--or50); border-color:var(--or300); color:var(--or2); }
.kb-btn.op { background:var(--g50); color:var(--g600); }
.kb-btn.fn { background:var(--or50); border-color:var(--or200); color:var(--or2); font-size:.68rem; }

/* Window / View settings */
.view-grid { display:grid; grid-template-columns:1fr 1fr; gap:.375rem; padding:.625rem .75rem; }
.view-field label { font-size:.65rem; font-weight:600; color:var(--g500); display:block; margin-bottom:.2rem; }
.view-input {
  width:100%; padding:.4rem .625rem;
  border:1px solid var(--g200); border-radius:.375rem;
  font-family:'JetBrains Mono', monospace; font-size:.8rem; color:var(--g800);
  background:var(--white); outline:none; transition:all .14s;
  user-select:text;
}
.view-input:focus { border-color:var(--or); box-shadow:0 0 0 3px rgba(249,115,22,.1); }
.view-btn { 
  grid-column:span 2;
  padding:.45rem; border:1px solid var(--g200); border-radius:.375rem;
  background:var(--g50); cursor:pointer; font-family:inherit; font-size:.73rem;
  font-weight:600; color:var(--g600); transition:all .14s;
}
.view-btn:hover { background:var(--or50); border-color:var(--or300); color:var(--or2); }

/* Style panel */
.style-section { padding:.625rem .75rem; }
.style-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
.style-label { font-size:.73rem; font-weight:600; color:var(--g600); }
.style-swatches { display:flex; gap:.3rem; flex-wrap:wrap; }
.swatch {
  width:22px; height:22px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:all .15s;
}
.swatch:hover { transform:scale(1.15); }
.swatch.selected { border-color:var(--g700); transform:scale(1.1); }
.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:.2rem 0; }
.toggle-label { font-size:.73rem; font-weight:500; color:var(--g600); }
.toggle {
  width:36px; height:20px; border-radius:99px;
  background:var(--g200); cursor:pointer;
  position:relative; transition:background .2s;
  border:none; flex-shrink:0;
}
.toggle.on { background:var(--or); }
.toggle::after {
  content:''; position:absolute;
  width:14px; height:14px; border-radius:50%; background:white;
  top:3px; left:3px; transition:left .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after { left:19px; }

/* Scrollable panel body */
.panel-scroll { flex:1; overflow-y:auto; }

/* ── CANVAS AREA ── */
.canvas-wrap {
  flex:1; position:relative; overflow:hidden; background:white;
  min-width:0;
}
canvas { display:block; position:absolute; top:0; left:0; }
#gridCanvas { z-index:1; }
#graphCanvas { z-index:2; }
#interactCanvas { z-index:3; }

/* Tooltip */
.coord-tooltip {
  position:absolute; z-index:10;
  background:var(--g800); color:white;
  font-family:'JetBrains Mono', monospace;
  font-size:.72rem; font-weight:500;
  padding:.3rem .6rem; border-radius:.375rem;
  pointer-events:none;
  opacity:0; transition:opacity .15s;
  white-space:nowrap;
}
.coord-tooltip.show { opacity:1; }

/* Point info */
.point-tag {
  position:absolute; z-index:10;
  background:var(--or50); border:1px solid var(--or200);
  font-family:'JetBrains Mono', monospace; font-size:.7rem; font-weight:600; color:var(--or2);
  padding:.2rem .5rem; border-radius:.375rem;
  pointer-events:none;
  white-space:nowrap;
}

/* Canvas toolbar */
.canvas-toolbar {
  position:absolute; top:.875rem; right:.875rem; z-index:20;
  display:flex; flex-direction:column; gap:.375rem;
}
.ct-btn {
  width:36px; height:36px; border-radius:var(--r);
  background:var(--white); border:1px solid var(--g200);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:var(--sh); transition:all .14s; color:var(--g600);
}
.ct-btn:hover { background:var(--or50); border-color:var(--or300); color:var(--or2); }
.ct-btn.active { background:var(--or); border-color:var(--or); color:white; }
.ct-btn svg { width:16px; height:16px; }
.ct-sep { height:1px; background:var(--g200); margin:.15rem 0; }

/* Mode badge */
.mode-badge {
  position:absolute; bottom:.875rem; left:50%; transform:translateX(-50%);
  background:var(--g800); color:white; z-index:20;
  font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  padding:.3rem .875rem; border-radius:99px;
  opacity:0; transition:opacity .3s; pointer-events:none;
}
.mode-badge.show { opacity:1; }

/* Color picker dropdown */
.color-picker-dropdown {
  position:absolute; z-index:200; background:white;
  border:1px solid var(--g200); border-radius:var(--rl);
  box-shadow:var(--shlg); padding:.625rem;
  width:160px; display:none;
}
.color-picker-dropdown.show { display:block; }
.cpd-title { font-size:.65rem; font-weight:700; color:var(--g500); letter-spacing:.08em; text-transform:uppercase; margin-bottom:.5rem; }
.cpd-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:.3rem; }
.cpd-swatch {
  width:22px; height:22px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:all .15s;
}
.cpd-swatch:hover { transform:scale(1.15); }
.cpd-swatch.selected { border-color:var(--g700); }
.cpd-custom { margin-top:.5rem; display:flex; gap:.3rem; align-items:center; }
.cpd-custom input[type=color] { width:28px; height:28px; border:none; border-radius:.25rem; cursor:pointer; padding:0; }
.cpd-custom-label { font-size:.65rem; color:var(--g500); }

/* Snack bar */
.snack {
  position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
  background:var(--g800); color:white; z-index:9999;
  font-size:.78rem; font-weight:500; padding:.55rem 1.25rem; border-radius:99px;
  box-shadow:var(--shlg); opacity:0; transition:all .3s;
  white-space:nowrap; pointer-events:none;
  border-left:3px solid var(--or);
}
.snack.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Responsive */
@media(max-width:768px){
  .panel { width:260px; min-width:240px; }
  .kb-grid { grid-template-columns:repeat(4,1fr); }
}
@media(max-width:560px){
  .panel { position:absolute; left:0; top:0; bottom:0; z-index:50; transform:translateX(-100%); transition:transform .25s ease; box-shadow:var(--shlg); }
  .panel.mobile-open { transform:translateX(0); }
  .app { overflow:hidden; }
}
</style>
</head>
<body>
<div style="padding:.625rem 1rem;background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:.5rem;position:sticky;top:0;z-index:100;">
<img src="assets/fred-logo.png" style="width:28px;height:28px;object-fit:contain;">
<span style="font-size:.85rem;font-weight:800;color:#ea580c;">FredInstitute</span>
<span style="font-size:.72rem;color:#9ca3af;margin-left:.5rem;">Fred Grapher</span>
<a href="dashboard.html" style="margin-left:auto;font-size:.72rem;font-weight:600;color:#ea580c;text-decoration:none;">← Back to Portal</a>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <div class="tb-brand">
      <div class="tb-logo">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14l3.5 3.5M17.5 14l-3.5 3.5"/></svg>
      </div>
      <div>
        <div class="tb-title">Fred Grapher</div>
        <div class="tb-subtitle">FredInstitute · Interactive Graphing Tool</div>
      </div>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-mobile-panel" onclick="toggleMobilePanel()" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Expressions
    </button>
    <button class="tb-btn" onclick="resetView()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Reset View
    </button>
  </div>
  <div style="display:flex;gap:.5rem;align-items:center">
    <button class="tb-btn" onclick="exportPNG()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export PNG
    </button>
    <button class="tb-btn" onclick="printGraph()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print
    </button>
    <button class="tb-btn primary" onclick="shareGraph()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Share
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app">

  <!-- LEFT PANEL -->
  <div class="panel" id="panel">
    <div class="panel-scroll">

      <!-- EXPRESSIONS -->
      <div class="panel-section">
        <div class="panel-section-title">Expressions</div>
        <div class="expr-list" id="exprList"></div>
        <button class="expr-add-btn" onclick="addExpression()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add expression
        </button>
      </div>

      <!-- KEYBOARD -->
      <div class="panel-section">
        <div class="panel-section-title">Quick Insert</div>
        <div class="kb-grid" id="kbGrid"></div>
      </div>

      <!-- VIEW WINDOW -->
      <div class="panel-section">
        <div class="panel-section-title">View Window</div>
        <div class="view-grid">
          <div class="view-field"><label>X min</label><input class="view-input" id="vXmin" value="-10" onchange="applyView()"></div>
          <div class="view-field"><label>X max</label><input class="view-input" id="vXmax" value="10" onchange="applyView()"></div>
          <div class="view-field"><label>Y min</label><input class="view-input" id="vYmin" value="-8" onchange="applyView()"></div>
          <div class="view-field"><label>Y max</label><input class="view-input" id="vYmax" value="8" onchange="applyView()"></div>
          <button class="view-btn" onclick="squareView()">Square Window</button>
          <button class="view-btn" onclick="trigView()">Trig Window [−2π, 2π]</button>
        </div>
      </div>

      <!-- STYLE -->
      <div class="panel-section">
        <div class="panel-section-title">Display</div>
        <div class="style-section">
          <div class="toggle-row">
            <span class="toggle-label">Axes</span>
            <button class="toggle on" id="tog-axes" onclick="toggleSetting('axes')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Grid lines</span>
            <button class="toggle on" id="tog-grid" onclick="toggleSetting('grid')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Minor grid</span>
            <button class="toggle" id="tog-minor" onclick="toggleSetting('minor')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Axis numbers</span>
            <button class="toggle on" id="tog-numbers" onclick="toggleSetting('numbers')"></button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Derivative trace</span>
            <button class="toggle" id="tog-deriv" onclick="toggleSetting('deriv')"></button>
          </div>
          <div style="margin-top:.625rem">
            <div class="style-label" style="margin-bottom:.35rem;font-size:.73rem;font-weight:600;color:var(--g600)">Line thickness</div>
            <input type="range" style="width:100%;accent-color:var(--or)" min="1" max="5" value="2" id="lineThickness" oninput="setLineThickness(this.value)">
          </div>
        </div>
      </div>

      <!-- USEFUL FUNCTIONS -->
      <div class="panel-section">
        <div class="panel-section-title">Examples — tap to load</div>
        <div style="padding:.5rem .75rem;display:flex;flex-direction:column;gap:.25rem">
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('')">y = x²</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('')">y = sin(x)</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('cos(x)')">y = cos(x)</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('2*x+1')">y = 2x + 1</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('x^3-3*x')">y = x³ − 3x</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('sqrt(x)')">y = √x</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('1/x')">y = 1/x</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('abs(x)')">y = |x|</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('e^x')">y = eˣ</button>
          <button class="view-btn" style="text-align:left;font-family:'JetBrains Mono',monospace;font-size:.72rem" onclick="loadExample('log(x)')">y = log(x)</button>
        </div>
      </div>

    </div><!-- /panel-scroll -->
  </div><!-- /panel -->

  <!-- CANVAS AREA -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gridCanvas"></canvas>
    <canvas id="graphCanvas"></canvas>
    <canvas id="interactCanvas"></canvas>

    <!-- Coordinate tooltip -->
    <div class="coord-tooltip" id="coordTooltip"></div>

    <!-- Canvas toolbar -->
    <div class="canvas-toolbar">
      <button class="ct-btn active" id="mode-pan" title="Pan" onclick="setMode('pan')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M12 12h.01"/><path d="M3 12h18M12 3v18"/></svg>
      </button>
      <button class="ct-btn" id="mode-point" title="Add point" onclick="setMode('point')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>

      <button class="ct-btn" id="mode-trace" title="Trace curve" onclick="setMode('trace')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M2 12s3-9 10-9 10 9 10 9-3 9-10 9-10-9-10-9z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <div class="ct-sep"></div>
      <button class="ct-btn" title="Zoom in" onclick="zoom(1.25)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="ct-btn" title="Zoom out" onclick="zoom(0.8)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="ct-btn" title="Fit all curves" onclick="fitAll()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3M16 21h3a2 2 0 002-2v-3"/></svg>
      </button>
      <div class="ct-sep"></div>
      <button class="ct-btn" title="Clear points" onclick="clearPoints()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>

    <div class="mode-badge" id="modeBadge"></div>
  </div>

</div><!-- /app -->

<!-- Color picker dropdown -->
<div class="color-picker-dropdown" id="colorPicker">
  <div class="cpd-title">Curve Color</div>
  <div class="cpd-grid" id="cpdGrid"></div>
  <div class="cpd-custom">
    <input type="color" id="customColor" value="#F97316" onchange="setCustomColor(this.value)">
    <span class="cpd-custom-label">Custom color</span>
  </div>
</div>

<div class="snack" id="snack"></div>

<script>
// ═══════════════════════════════════════════════════
//  FRED GRAPHER — Core Engine
// ═══════════════════════════════════════════════════

// ── State ──
const state = {
  xMin:-10, xMax:10, yMin:-8, yMax:8,
  panX:0, panY:0,
  mode:'pan', // pan | point | trace
  settings:{ axes:true, grid:true, minor:false, numbers:true, deriv:false },
  lineThickness:2,
  expressions:[],
  points:[],
  tracePoint:null,
  dragging:false,
  lastMouse:{x:0,y:0},
  activeColorExprIdx:null,
};

const COLORS = [
  '#F97316','#EA580C','#C2410C','#FB923C','#FED7AA',
  '#374151','#6B7280','#9CA3AF','#D1D5DB','#111827',
  '#3B82F6','#8B5CF6','#22C55E','#EF4444','#EAB308',
];

const KB_KEYS = [
  {label:'x',  val:'x', cls:''},
  {label:'y',  val:'y', cls:''},
  {label:'^',  val:'^', cls:'op'},
  {label:'(',  val:'(', cls:'op'},
  {label:')',  val:')', cls:'op'},
  {label:'sin',val:'sin(', cls:'fn'},
  {label:'cos',val:'cos(', cls:'fn'},
  {label:'tan',val:'tan(', cls:'fn'},
  {label:'√',  val:'sqrt(', cls:'fn'},
  {label:'|x|',val:'abs(', cls:'fn'},
  {label:'ln', val:'log(', cls:'fn'},
  {label:'log',val:'log10(', cls:'fn'},
  {label:'eˣ', val:'e^', cls:'fn'},
  {label:'π',  val:'pi', cls:'fn'},
  {label:'e',  val:'e', cls:'fn'},
];

const EXAMPLES = {
  '':      {expr:'',       color:'#F97316'},
  '':   {expr:'',    color:'#EA580C'},
  'cos(x)':   {expr:'cos(x)',    color:'#374151'},
  '2*x+1':    {expr:'2*x+1',    color:'#F97316'},
  'x^3-3*x':  {expr:'x^3-3*x',  color:'#EA580C'},
  'sqrt(x)':  {expr:'sqrt(x)',   color:'#22C55E'},
  '1/x':      {expr:'1/x',       color:'#3B82F6'},
  'abs(x)':   {expr:'abs(x)',    color:'#8B5CF6'},
  'e^x':      {expr:'e^x',       color:'#EF4444'},
  'log(x)':   {expr:'log(x)',    color:'#374151'},
};

// ── Canvas setup ──
const canvasWrap = document.getElementById('canvasWrap');
const gridC = document.getElementById('gridCanvas');
const graphC = document.getElementById('graphCanvas');
const interC = document.getElementById('interactCanvas');
const ctxG = gridC.getContext('2d');
const ctxP = graphC.getContext('2d');
const ctxI = interC.getContext('2d');

function resize() {
  const w = canvasWrap.clientWidth, h = canvasWrap.clientHeight;
  [gridC,graphC,interC].forEach(c=>{ c.width=w; c.height=h; });
  drawAll();
}
window.addEventListener('resize', resize);

// ── Coordinate transforms ──
function toPixel(x, y) {
  const w=gridC.width, h=gridC.height;
  const px = (x-state.xMin)/(state.xMax-state.xMin)*w;
  const py = (1-(y-state.yMin)/(state.yMax-state.yMin))*h;
  return [px, py];
}
function fromPixel(px, py) {
  const w=gridC.width, h=gridC.height;
  const x = px/w*(state.xMax-state.xMin)+state.xMin;
  const y = (1-py/h)*(state.yMax-state.yMin)+state.yMin;
  return [x, y];
}

// ── Draw grid ──
function drawGrid() {
  const ctx=ctxG, w=gridC.width, h=gridC.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(0,0,w,h);

  const xRange=state.xMax-state.xMin, yRange=state.yMax-state.yMin;
  const gridStep = Math.pow(10, Math.floor(Math.log10(xRange/8)));

  // Minor grid
  if(state.settings.minor) {
    ctx.strokeStyle='#F3F4F6'; ctx.lineWidth=0.5;
    const mstep=gridStep/5;
    for(let x=Math.ceil(state.xMin/mstep)*mstep; x<=state.xMax; x+=mstep) {
      const [px]=toPixel(x,0);
      ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,h); ctx.stroke();
    }
    for(let y=Math.ceil(state.yMin/mstep)*mstep; y<=state.yMax; y+=mstep) {
      const [,py]=toPixel(0,y);
      ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(w,py); ctx.stroke();
    }
  }

  // Major grid
  if(state.settings.grid) {
    ctx.strokeStyle='#E5E7EB'; ctx.lineWidth=1;
    for(let x=Math.ceil(state.xMin/gridStep)*gridStep; x<=state.xMax; x+=gridStep) {
      const [px]=toPixel(x,0);
      ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,h); ctx.stroke();
    }
    for(let y=Math.ceil(state.yMin/gridStep)*gridStep; y<=state.yMax; y+=gridStep) {
      const [,py]=toPixel(0,y);
      ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(w,py); ctx.stroke();
    }
  }

  // Axes
  if(state.settings.axes) {
    const [ox,oy]=toPixel(0,0);
    ctx.strokeStyle='#9CA3AF'; ctx.lineWidth=1.5;
    // X axis
    if(oy>=0&&oy<=h){ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(w,oy);ctx.stroke();}
    // Y axis
    if(ox>=0&&ox<=w){ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,h);ctx.stroke();}
    // Arrow heads
    ctx.fillStyle='#9CA3AF';
    if(oy>=0&&oy<=h){ctx.beginPath();ctx.moveTo(w-2,oy);ctx.lineTo(w-12,oy-5);ctx.lineTo(w-12,oy+5);ctx.fill();}
    if(ox>=0&&ox<=w){ctx.beginPath();ctx.moveTo(ox,2);ctx.lineTo(ox-5,12);ctx.lineTo(ox+5,12);ctx.fill();}
  }

  // Labels
  if(state.settings.numbers) {
    ctx.fillStyle='#6B7280';
    ctx.font='500 11px Inter,system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    const [ox,oy]=toPixel(0,0);
    const coy=Math.max(4,Math.min(h-18,oy+6));
    for(let x=Math.ceil(state.xMin/gridStep)*gridStep; x<=state.xMax; x+=gridStep) {
      if(Math.abs(x)<gridStep*0.01) continue;
      const [px]=toPixel(x,0);
      const label=Math.abs(x)>0.001?+x.toFixed(6)+'':x.toFixed(0);
      ctx.fillText(label, px, coy);
    }
    ctx.textAlign='right'; ctx.textBaseline='middle';
    const cox=Math.max(4,Math.min(w-4,ox-6));
    for(let y=Math.ceil(state.yMin/gridStep)*gridStep; y<=state.yMax; y+=gridStep) {
      if(Math.abs(y)<gridStep*0.01) continue;
      const [,py]=toPixel(0,y);
      ctx.fillText(+y.toFixed(6)+'', cox, py);
    }
  }
}

// ── Expression evaluator ──
function evalExpr(expr, xVal) {
  try {
    let e = expr.trim();
    if(!e) return NaN;
    e = e.replace(/\^/g,'**');
    e = e.replace(/([0-9)])\s*x/g,'$1*x');
    e = e.replace(/x\s*\(/g,'x*(');
    e = e.replace(/\bsin\b/g,'Math.sin');
    e = e.replace(/\bcos\b/g,'Math.cos');
    e = e.replace(/\btan\b/g,'Math.tan');
    e = e.replace(/\bsqrt\b/g,'Math.sqrt');
    e = e.replace(/\babs\b/g,'Math.abs');
    e = e.replace(/\blog10\b/g,'Math.log10');
    e = e.replace(/\blog\b/g,'Math.log');
    e = e.replace(/\bpi\b/g,'Math.PI');
    e = e.replace(/\be\b/g,'Math.E');
    const fn = new Function('x', '"use strict"; return ('+e+');');
    const v = fn(xVal);
    return isFinite(v) ? v : NaN;
  } catch(err) { return NaN; }
}

// ── Draw curves ──
function drawCurves() {
  const ctx=ctxP, w=graphC.width, h=graphC.height;
  ctx.clearRect(0,0,w,h);
  const steps = w*2;

  state.expressions.forEach(ex => {
    if(!ex.visible||!ex.expr.trim()) return;
    let lastValid=false, lastPx=0, lastPy=0;
    ctx.beginPath();
    ctx.strokeStyle=ex.color;
    ctx.lineWidth=state.lineThickness;
    ctx.lineJoin='round';
    ctx.lineCap='round';

    for(let i=0;i<=steps;i++){
      const xVal=state.xMin+i/steps*(state.xMax-state.xMin);
      const yVal=evalExpr(ex.expr, xVal);
      if(isNaN(yVal)){lastValid=false;continue;}
      const [px,py]=toPixel(xVal,yVal);
      const inView=py>-50&&py<h+50;
      // Break on discontinuity
      if(lastValid&&Math.abs(py-lastPy)>h*1.5){lastValid=false;}
      if(!lastValid||!inView){
        if(inView){ctx.moveTo(px,py);lastValid=true;}
      } else {
        ctx.lineTo(px,py); lastValid=true;
      }
      lastPx=px; lastPy=py;
    }
    ctx.stroke();
  });

  // Draw placed points
  state.points.forEach(pt=>{
    const [px,py]=toPixel(pt.x,pt.y);
    ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2);
    ctx.fillStyle=pt.color||'#F97316';
    ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.stroke();
  });

  // Trace point
  if(state.tracePoint&&state.mode==='trace'){
    const [px,py]=toPixel(state.tracePoint.x,state.tracePoint.y);
    ctx.beginPath(); ctx.arc(px,py,7,0,Math.PI*2);
    ctx.fillStyle='rgba(249,115,22,0.2)';
    ctx.fill();
    ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2);
    ctx.fillStyle='#F97316';
    ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.stroke();
  }
}

function drawAll() { drawGrid(); drawCurves(); }

// ── Interaction ──
interC.addEventListener('mousedown', onMouseDown);
interC.addEventListener('mousemove', onMouseMove);
interC.addEventListener('mouseup', onMouseUp);
interC.addEventListener('mouseleave', ()=>{ state.dragging=false; ctxI.clearRect(0,0,interC.width,interC.height); document.getElementById('coordTooltip').classList.remove('show'); });
interC.addEventListener('wheel', onWheel, {passive:false});
interC.addEventListener('touchstart', onTouchStart, {passive:false});
interC.addEventListener('touchmove', onTouchMove, {passive:false});
interC.addEventListener('touchend', onTouchEnd);
interC.addEventListener('dblclick', onDblClick);

let touchStartDist=0, touchStartXMin=0, touchStartXMax=0, touchStartYMin=0, touchStartYMax=0;

function onMouseDown(e) {
  if(state.mode==='pan'){
    state.dragging=true;
    state.lastMouse={x:e.clientX,y:e.clientY};
    interC.style.cursor='grabbing';
  }
}
function onMouseUp(e) {
  if(state.mode==='pan'){
    state.dragging=false;
    interC.style.cursor='';
  } else if(state.mode==='point') {
    const rect=interC.getBoundingClientRect();
    const [x,y]=fromPixel(e.clientX-rect.left, e.clientY-rect.top);
    addPoint(x,y);
  }
}
function onMouseMove(e) {
  const rect=interC.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const [wx,wy]=fromPixel(mx,my);

  // Coordinate tooltip
  const tooltip=document.getElementById('coordTooltip');
  tooltip.textContent='('+wx.toFixed(2)+', '+wy.toFixed(2)+')';
  tooltip.style.left=(mx+12)+'px'; tooltip.style.top=(my-28)+'px';
  tooltip.classList.add('show');

  if(state.mode==='trace') {
    traceAt(wx);
    return;
  }

  // Draw crosshair in interact canvas
  ctxI.clearRect(0,0,interC.width,interC.height);
  if(state.mode==='pan') {
    ctxI.strokeStyle='rgba(249,115,22,0.3)'; ctxI.lineWidth=1; ctxI.setLineDash([4,4]);
    ctxI.beginPath(); ctxI.moveTo(mx,0); ctxI.lineTo(mx,interC.height); ctxI.stroke();
    ctxI.beginPath(); ctxI.moveTo(0,my); ctxI.lineTo(interC.width,my); ctxI.stroke();
    ctxI.setLineDash([]);
  }

  if(state.dragging&&state.mode==='pan') {
    const dx=(e.clientX-state.lastMouse.x), dy=(e.clientY-state.lastMouse.y);
    const xRange=state.xMax-state.xMin, yRange=state.yMax-state.yMin;
    const dxW=-dx/gridC.width*xRange, dyW=dy/gridC.height*yRange;
    state.xMin+=dxW; state.xMax+=dxW;
    state.yMin+=dyW; state.yMax+=dyW;
    state.lastMouse={x:e.clientX,y:e.clientY};
    syncViewInputs();
    drawAll();
  }
}
function onWheel(e) {
  e.preventDefault();
  const rect=interC.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const [wx,wy]=fromPixel(mx,my);
  const factor=e.deltaY>0?0.9:1.1;
  state.xMin=(state.xMin-wx)*factor+wx;
  state.xMax=(state.xMax-wx)*factor+wx;
  state.yMin=(state.yMin-wy)*factor+wy;
  state.yMax=(state.yMax-wy)*factor+wy;
  syncViewInputs(); drawAll();
}
function onDblClick(e) {
  const rect=interC.getBoundingClientRect();
  const [wx,wy]=fromPixel(e.clientX-rect.left, e.clientY-rect.top);
  // Zoom in on double-click
  const factor=1.4;
  state.xMin=(state.xMin-wx)/factor+wx;
  state.xMax=(state.xMax-wx)/factor+wx;
  state.yMin=(state.yMin-wy)/factor+wy;
  state.yMax=(state.yMax-wy)/factor+wy;
  syncViewInputs(); drawAll();
}
function onTouchStart(e) {
  if(e.touches.length===2) {
    touchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    touchStartXMin=state.xMin; touchStartXMax=state.xMax;
    touchStartYMin=state.yMin; touchStartYMax=state.yMax;
  } else if(e.touches.length===1) {
    state.dragging=true;
    state.lastMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if(e.touches.length===2) {
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const scale=touchStartDist/dist;
    const cx=(touchStartXMin+touchStartXMax)/2, cy=(touchStartYMin+touchStartYMax)/2;
    const hw=(touchStartXMax-touchStartXMin)/2*scale, hh=(touchStartYMax-touchStartYMin)/2*scale;
    state.xMin=cx-hw; state.xMax=cx+hw; state.yMin=cy-hh; state.yMax=cy+hh;
    syncViewInputs(); drawAll();
  } else if(e.touches.length===1&&state.dragging) {
    const dx=e.touches[0].clientX-state.lastMouse.x;
    const dy=e.touches[0].clientY-state.lastMouse.y;
    const xRange=state.xMax-state.xMin, yRange=state.yMax-state.yMin;
    state.xMin-=dx/gridC.width*xRange; state.xMax-=dx/gridC.width*xRange;
    state.yMin+=dy/gridC.height*yRange; state.yMax+=dy/gridC.height*yRange;
    state.lastMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
    syncViewInputs(); drawAll();
  }
}
function onTouchEnd(e){ state.dragging=false; }

// ── Expressions ──
function addExpression(expr='', color=null, visible=true) {
  const colors=['#F97316','#EA580C','#374151','#3B82F6','#8B5CF6','#22C55E'];
  const c=color||colors[state.expressions.length%colors.length];
  const id=Date.now()+Math.random();
  state.expressions.push({id,expr,color:c,visible,error:false});
  renderExprList();
  // Focus new input
  setTimeout(()=>{
    const inputs=document.querySelectorAll('.expr-input');
    if(inputs.length>0) inputs[inputs.length-1].focus();
  },50);
  return id;
}

function removeExpression(id) {
  state.expressions=state.expressions.filter(e=>e.id!==id);
  renderExprList();
  drawAll();
}

function renderExprList() {
  const list=document.getElementById('exprList');
  list.innerHTML='';
  state.expressions.forEach((ex,i)=>{
    const row=document.createElement('div');
    row.className='expr-row'+(ex.error?' error':'');
    row.id='expr-row-'+ex.id;

    const dot=document.createElement('div');
    dot.className='expr-color-dot';
    dot.style.background=ex.color;
    dot.title='Change color';
    dot.onclick=(e)=>{ e.stopPropagation(); openColorPicker(ex.id, e.target); };

    const inp=document.createElement('input');
    inp.className='expr-input';
    inp.value=ex.expr;
    inp.placeholder='y = f(x)';
    inp.spellcheck=false;
    inp.setAttribute('data-id',ex.id);
    inp.oninput=()=>{ ex.expr=inp.value; validateAndDraw(ex, row); };
    inp.onfocus=()=>{ row.classList.add('active'); state.activeExprInput=inp; };
    inp.onblur=()=>{ row.classList.remove('active'); };
    inp.onkeydown=(e)=>{ if(e.key==='Enter'){inp.blur();} };

    const del=document.createElement('button');
    del.className='expr-del'; del.innerHTML='×'; del.title='Remove';
    del.onclick=()=>{ removeExpression(ex.id); };

    row.appendChild(dot); row.appendChild(inp); row.appendChild(del);
    list.appendChild(row);

    if(ex.error) {
      const em=document.createElement('div');
      em.className='expr-error-msg'; em.textContent='Syntax error';
      list.appendChild(em);
    }
  });
}

function validateAndDraw(ex, row) {
  const test=evalExpr(ex.expr, 1);
  ex.error = ex.expr.trim().length>0 && isNaN(test) && !ex.expr.includes('x');
  // Safer: just try to plot, catch errors visually
  const test2=evalExpr(ex.expr,2);
  const test3=evalExpr(ex.expr,-1);
  ex.error = ex.expr.trim().length>0 && isNaN(test) && isNaN(test2) && isNaN(test3);
  row.className='expr-row'+(ex.error?' error':'');
  drawAll();
}

// ── Color picker ──
let activeColorId=null;
function openColorPicker(id, anchorEl) {
  activeColorId=id;
  const picker=document.getElementById('colorPicker');
  const grid=document.getElementById('cpdGrid');
  grid.innerHTML='';
  const ex=state.expressions.find(e=>e.id===id);

  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='cpd-swatch'+(ex&&ex.color===c?' selected':'');
    sw.style.background=c;
    sw.onclick=()=>{ setExprColor(id,c); closePicker(); };
    grid.appendChild(sw);
  });

  const rect=anchorEl.getBoundingClientRect();
  picker.style.top=(rect.bottom+8)+'px';
  picker.style.left=rect.left+'px';
  picker.classList.add('show');

  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),10);
}
function closePicker(){document.getElementById('colorPicker').classList.remove('show');}
function setExprColor(id,color){
  const ex=state.expressions.find(e=>e.id===id);
  if(ex){ex.color=color; renderExprList(); drawAll();}
}
function setCustomColor(color){if(activeColorId)setExprColor(activeColorId,color);}

// ── Keyboard insert ──
function buildKB() {
  const grid=document.getElementById('kbGrid');
  KB_KEYS.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='kb-btn '+(k.cls||'');
    btn.textContent=k.label;
    btn.onclick=()=>{
      const inp=document.activeElement;
      if(inp&&inp.classList.contains('expr-input')) {
        const start=inp.selectionStart, end=inp.selectionEnd;
        inp.value=inp.value.slice(0,start)+k.val+inp.value.slice(end);
        inp.selectionStart=inp.selectionEnd=start+k.val.length;
        inp.dispatchEvent(new Event('input'));
        inp.focus();
      } else {
        // Try to focus last active or first
        const inputs=document.querySelectorAll('.expr-input');
        if(inputs.length){
          inputs[inputs.length-1].focus();
          const inp2=inputs[inputs.length-1];
          inp2.value+=k.val;
          inp2.dispatchEvent(new Event('input'));
        }
      }
    };
    grid.appendChild(btn);
  });
}

// ── Mode controls ──
function setMode(m) {
  state.mode=m;
  ['pan','point','trace'].forEach(id=>{
    document.getElementById('mode-'+id)?.classList.toggle('active',id===m);
  });
  interC.style.cursor = m==='point'?'crosshair':m==='trace'?'none':'';
  const badge=document.getElementById('modeBadge');
  const labels={pan:'Pan & Zoom', point:'Click to place point', trace:'Move to trace curve'};
  badge.textContent=labels[m]||m;
  badge.classList.add('show');
  setTimeout(()=>badge.classList.remove('show'),1800);
}

// ── Points ──
function addPoint(x,y) {
  const color=state.expressions.length>0?state.expressions[0].color:'#F97316';
  state.points.push({x,y,color});
  showSnack('Point ('+x.toFixed(2)+', '+y.toFixed(2)+') added');
  drawAll();
}
function clearPoints() { state.points=[]; drawAll(); showSnack('Points cleared'); }

// ── Trace ──
function traceAt(wx) {
  if(!state.expressions.length) return;
  const ex=state.expressions.find(e=>e.visible&&e.expr.trim());
  if(!ex) return;
  const y=evalExpr(ex.expr,wx);
  if(isNaN(y)){state.tracePoint=null;drawAll();return;}
  state.tracePoint={x:wx,y};
  const tooltip=document.getElementById('coordTooltip');
  tooltip.textContent='x='+wx.toFixed(3)+'  y='+y.toFixed(3);
  drawAll();
}

// ── View controls ──
function resetView(){state.xMin=-10;state.xMax=10;state.yMin=-8;state.yMax=8;syncViewInputs();drawAll();}
function squareView(){const s=Math.min(state.xMax-state.xMin,(state.yMax-state.yMin));const cx=(state.xMin+state.xMax)/2,cy=(state.yMin+state.yMax)/2;state.xMin=cx-s/2;state.xMax=cx+s/2;state.yMin=cy-s/2;state.yMax=cy+s/2;syncViewInputs();drawAll();}
function trigView(){state.xMin=-2*Math.PI;state.xMax=2*Math.PI;state.yMin=-1.5;state.yMax=1.5;syncViewInputs();drawAll();}
function applyView(){
  const xmin=parseFloat(document.getElementById('vXmin').value);
  const xmax=parseFloat(document.getElementById('vXmax').value);
  const ymin=parseFloat(document.getElementById('vYmin').value);
  const ymax=parseFloat(document.getElementById('vYmax').value);
  if(!isNaN(xmin)&&!isNaN(xmax)&&!isNaN(ymin)&&!isNaN(ymax)&&xmin<xmax&&ymin<ymax){
    state.xMin=xmin;state.xMax=xmax;state.yMin=ymin;state.yMax=ymax;drawAll();
  }
}
function syncViewInputs(){
  document.getElementById('vXmin').value=+state.xMin.toFixed(4)+'';
  document.getElementById('vXmax').value=+state.xMax.toFixed(4)+'';
  document.getElementById('vYmin').value=+state.yMin.toFixed(4)+'';
  document.getElementById('vYmax').value=+state.yMax.toFixed(4)+'';
}
function zoom(f){const cx=(state.xMin+state.xMax)/2,cy=(state.yMin+state.yMax)/2,hw=(state.xMax-state.xMin)/2/f,hh=(state.yMax-state.yMin)/2/f;state.xMin=cx-hw;state.xMax=cx+hw;state.yMin=cy-hh;state.yMax=cy+hh;syncViewInputs();drawAll();}

function fitAll() {
  let ymin=Infinity,ymax=-Infinity;
  state.expressions.forEach(ex=>{
    if(!ex.expr.trim()) return;
    for(let i=0;i<=500;i++){
      const x=state.xMin+i/500*(state.xMax-state.xMin);
      const y=evalExpr(ex.expr,x);
      if(!isNaN(y)){ymin=Math.min(ymin,y);ymax=Math.max(ymax,y);}
    }
  });
  if(isFinite(ymin)&&isFinite(ymax)){
    const pad=(ymax-ymin)*0.1||1;
    state.yMin=ymin-pad; state.yMax=ymax+pad;
    syncViewInputs(); drawAll();
  }
}

// ── Settings toggles ──
function toggleSetting(key) {
  state.settings[key]=!state.settings[key];
  const tog=document.getElementById('tog-'+key);
  if(tog) tog.classList.toggle('on', state.settings[key]);
  drawAll();
}
function setLineThickness(v){ state.lineThickness=parseInt(v); drawAll(); }

// ── Examples ──
function loadExample(key) {
  const ex=EXAMPLES[key];
  if(!ex) return;
  addExpression(ex.expr, ex.color);
  showSnack('Loaded y = '+ex.expr);
}

// ── Export & Print ──
function exportPNG(){
  // Composite all canvases
  const w=gridC.width, h=gridC.height;
  const out=document.createElement('canvas'); out.width=w; out.height=h;
  const ctx=out.getContext('2d');
  ctx.drawImage(gridC,0,0); ctx.drawImage(graphC,0,0);
  // Add watermark
  ctx.fillStyle='rgba(249,115,22,0.5)';
  ctx.font='bold 13px Inter,system-ui';
  ctx.textAlign='right'; ctx.textBaseline='bottom';
  ctx.fillText('FredInstitute Grapher',w-12,h-10);
  const a=document.createElement('a');
  a.download='fred-graph.png';
  a.href=out.toDataURL('image/png');
  a.click();
  showSnack('Graph exported as PNG');
}

function printGraph(){
  const w=gridC.width, h=gridC.height;
  const out=document.createElement('canvas'); out.width=w; out.height=h;
  const ctx=out.getContext('2d');
  ctx.fillStyle='white'; ctx.fillRect(0,0,w,h);
  ctx.drawImage(gridC,0,0); ctx.drawImage(graphC,0,0);
  // Expressions list
  ctx.fillStyle='#374151'; ctx.font='bold 12px Inter,system-ui';
  ctx.textAlign='left'; ctx.textBaseline='top';
  let exprTxt='Expressions: '+state.expressions.filter(e=>e.expr.trim()).map(e=>'y='+e.expr).join('  |  ');
  ctx.fillText(exprTxt.slice(0,120),12,12);
  // Watermark
  ctx.fillStyle='rgba(249,115,22,0.6)';
  ctx.font='bold 12px Inter'; ctx.textAlign='right'; ctx.textBaseline='bottom';
  ctx.fillText('Fred Grapher · FredInstitute',w-12,h-10);
  const win=window.open('','_blank');
  win.document.write('<html><head><title>Fred Graph</title><style>body{margin:0;display:flex;align-items:center;justify-content:center;background:#f9fafb;padding:2rem}img{max-width:100%;box-shadow:0 4px 20px rgba(0,0,0,.1);border-radius:.5rem}</style></head><body><img src="'+out.toDataURL('image/png')+'"></body></html>');
  win.document.close();
  setTimeout(()=>win.print(),400);
}

function shareGraph(){
  const data=state.expressions.filter(e=>e.expr.trim()).map(e=>e.expr).join(',');
  const hash='#exprs='+encodeURIComponent(data);
  navigator.clipboard.writeText(window.location.origin+window.location.pathname+hash).then(()=>{
    showSnack('Link copied to clipboard!');
  }).catch(()=>showSnack('Share: '+window.location.pathname+hash));
}

// ── Load from URL hash ──
function loadFromHash(){
  try{
    const hash=window.location.hash;
    if(hash.includes('#exprs=')){
      const exprs=decodeURIComponent(hash.split('#exprs=')[1]).split(',');
      exprs.forEach(e=>{if(e.trim())addExpression(e.trim());});
    }
  } catch(e){}
}

// ── Snackbar ──
function showSnack(msg){
  const s=document.getElementById('snack');
  s.textContent=msg; s.classList.add('show');
  clearTimeout(s._t); s._t=setTimeout(()=>s.classList.remove('show'),2500);
}

// ── Mobile panel ──
function toggleMobilePanel(){
  document.getElementById('panel').classList.toggle('mobile-open');
}

// ── Init ──
function init(){
  buildKB();
  resize();
  // Load default expression
  addExpression('', '#F97316');
  addExpression('', '#EA580C');
  // Load from URL hash
  loadFromHash();
  // Close color picker on outside click
  document.addEventListener('click',e=>{
    if(!e.target.closest('#colorPicker')&&!e.target.classList.contains('expr-color-dot')){
      document.getElementById('colorPicker').classList.remove('show');
    }
  });
  // Mobile detect
  if(window.innerWidth<=560){
    document.getElementById('btn-mobile-panel').style.display='inline-flex';
  }
}

init();
</script>
